style = 'fg:red'
format = '[ $symbol $version]($style)'

[lua]
symbol = ""
style = 'fg:pink'
format = '[ $symbol $version]($style)'

[haskell]
symbol = ""
style = 'fg:mauve'
format = '[ $symbol $version]($style)'

[elixir]
