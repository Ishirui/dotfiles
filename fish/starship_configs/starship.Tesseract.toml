style = 'fg:pink'
format = '[ $symbol $version]($style)'

[bun]
symbol = ""
style = 'fg:lavender'
format = '[ $symbol $version]($style)'

[deno]
symbol = "\U000F076C"
style = 'fg:teal'
format = '[ $symbol $version]($style)'

[rust]
