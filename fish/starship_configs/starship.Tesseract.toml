# -- environment overlays -----------------------------------------------------

[conda]
symbol = ""
style = 'fg:pink'
format = '[ $symbol $environment]($style)'
ignore_base = false

[pixi]
symbol = "\U000F0117"
style = 'fg:teal'
format = '[ $symbol( $version)( $environment)]($style)'

[direnv]
symbol = ""
style = 'fg:pink'
format = '[ $symbol direnv]($style)'
allowed_msg = ''
not_allowed_msg = " \U000F033E unlock"
loaded_msg = ''
unloaded_msg = ' unloaded'
disabled = false

[nix_shell]
symbol = "\U000F1105"
style = 'fg:sky'
format = '[ $symbol $state(\($name\))]($style)'
impure_msg = 'impure'
pure_msg   = 'pure'
