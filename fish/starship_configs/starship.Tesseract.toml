[docker_context]
symbol = ""
style = 'fg:pink'
format = '[ $symbol $context]($style)'
only_with_files = false

[aws]
symbol = "\U000F2E0F"
style = 'fg:lavender'
format = '[ $symbol $profile(\($region\))]($style)'

# -- meta / system ------------------------------------------------------------

[jobs]
symbol = "\U000F051F"
style = 'fg:mauve'
format = '[ $symbol $number]($style)'
threshold = 1
symbol_threshold = 1
number_threshold = 1

[sudo]
symbol = "\U000F033E"
style = 'fg:red'
format = '[ $symbol sudo]($style)'
allow_windows = false
disabled = false

[battery]
format = '[ $symbol$percentage]($style)'

[[battery.display]]
threshold = 30
style = 'fg:rosewater'

[[battery.display]]
threshold = 15
style = 'fg:red'
discharging_symbol = "\U000F0083"

# =============================================================================
# right prompt — silenced ambient: clock always; exit + duration on demand.
# =============================================================================

[time]
disabled = false
time_format = '%R'
style = 'fg:subtext0'
format = '[ $time]($style)'
utc_time_offset = 'local'

[cmd_duration]
min_time = 2_000
style = 'fg:overlay1'
format = '[ $duration  ]($style)'
show_milliseconds = false
show_notifications = true
min_time_to_notify = 45_000

[status]
disabled = false
style = 'fg:red'
format = '[$symbol$common_meaning$signal_name$maybe_int  ]($style)'
symbol = '✘ '
not_found_symbol = ' '
not_executable_symbol = ' '
sigint_symbol = "\U000F0506 "
signal_symbol = "\U000F0506 "
success_symbol = ''
recognize_signal_code = true
map_symbol = true
pipestatus = true
pipestatus_format = '\[$pipestatus\] => $symbol$common_meaning$signal_name$maybe_int  '

# =============================================================================
# second line
# =============================================================================

[line_break]
disabled = false

[character]
success_symbol = '[❯](mauve)'
error_symbol   = '[❯](red)'
vimcmd_symbol             = '[❮](green)'
vimcmd_replace_symbol     = '[❮](lavender)'
vimcmd_replace_one_symbol = '[❮](lavender)'
vimcmd_visual_symbol      = '[❮](yellow)'

