- name: Software | Tools | Install GUI system tools
  tags: software,tools,gui
  kewlfft.aur.aur:
    name:
      - partitionmanager # Should be installed already
      - filelight # Ditto
      # - cheese # Camera utility
      - helvum # Audio patch panel
      - yakuake
      - qbittorrent
      - wireshark-qt
      - virt-manager

- name: Software | Tools | Install CLI tools
  tags: software,tools,cli
  kewlfft.aur.aur:
    name:
      # Some of these are CachyOS defaults
      - fish
      - otf-monaspace-nerd # Monaspace font from GitHub, with Nerd Font icons
      - fastfetch # For style
      - btop # Modern htop
      - eza # Modern ls
      - bat # Modern cat
      - micro # Modern nano
      - moor # Modern less
      - fd # Modern find
      - starship # Prompt
      - fzf
      - ripgrep
      - zoxide
      - tealdeer # Rust-based tldr implementation
      - wget
      - curl
      - aria2
      - tmux
      - rsync
      - nmap
      - gnupg
      - flatpak
      - btrbk
      - superfile
      - tree
