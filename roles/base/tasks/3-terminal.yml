- name: Terminal | Load fish and starship config
  tags: terminal
  copy:
    src: "{{ playbook_dir }}/fish/"
    dest: "{{ dotconfig_path }}/fish/"

- name: Terminal | Activate per-host starship config
  tags: terminal
  # Picks fish/starship_configs/starship.<hostname>.toml from the dotfiles
  # repo (rendered by scripts/build-starship-configs.sh) and lands it at the
  # path the fish init reads ($STARSHIP_CONFIG = ~/.config/fish/starship.toml).
  # Falls back to starship.default.toml for any host not in the build script's
  # map.
  copy:
    src: "{{ item }}"
    dest: "{{ dotconfig_path }}/fish/starship.toml"
  with_first_found:
    - files:
        - "{{ playbook_dir }}/fish/starship_configs/starship.{{ ansible_hostname }}.toml"
        - "{{ playbook_dir }}/fish/starship_configs/starship.default.toml"

- name: Terminal | Load terminal profiles
  tags: terminal
  copy:
    src: "{{ playbook_dir }}/kde/konsole/"
    dest: "{{ dotlocalshare_path }}/konsole/"

- name: Terminal | Load Konsole config
  tags: terminal
  copy:
    src: "{{ playbook_dir }}/kde/konsole/konsolerc"
    dest: "{{ dotconfig_path }}/konsolerc"

- name: Terminal | Load Yakuake config
  tags: terminal
  copy:
    src: "{{ playbook_dir }}/kde/konsole/yakuakerc"
    dest: "{{ dotconfig_path }}/yakuakerc"

- name: KDE | Terminal | Launch Yakuake at startup
  tags: terminal,kde
  copy:
    src: "files/autostart/org.kde.yakuake.desktop"
    dest: "{{ dotconfig_path }}/autostart/org.kde.yakuake.desktop"
