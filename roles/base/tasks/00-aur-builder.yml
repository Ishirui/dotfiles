# Set up the `aur_builder` user used by all kewlfft.aur.aur install tasks.
# Created once here at the very start of the run and deleted once at the very
# end (99-aur-builder.yml). This makes the playbook slightly non-idempotent
# across runs, which is acceptable.

- name: AUR builder | Create the `aur_builder` user
  become: yes
  ansible.builtin.user:
    name: aur_builder
    create_home: no
    group: wheel

- name: AUR builder | Allow `aur_builder` to run `sudo pacman` without a password
  become: yes
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/11-install-aur_builder
    line: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
    create: yes
    mode: 0644
    validate: "visudo -cf %s"
