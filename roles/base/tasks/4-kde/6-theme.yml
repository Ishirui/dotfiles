---
# Note: `kde_catppuccin_flavor` should be defined in `roles/desktop/vars/main.yml`
# Example value: MacchiatoLavender

- name: KDE | Theme | Set Catppuccin color scheme
  tags: KDE,theme,catppuccin
  community.general.kdeconfig:
    path: "{{ dotconfig_path }}/kdeglobals"
    values:
      - group: General
        key: ColorScheme
        value: "Catppuccin-{{ kde_catppuccin_flavor }}"

- name: KDE | Theme | Install Klassy config
  tags: KDE,theme,klassy
  copy:
    src: "{{ playbook_dir }}/kde/klassyrc"
    dest: "{{ dotconfig_path }}/klassy/klassyrc"
    mode: "0644"

- name: KDE | Theme | Set application style and icon theme to Klassy
  tags: KDE,theme,klassy
  community.general.kdeconfig:
    path: "{{ dotconfig_path }}/kdeglobals"
    values:
      - group: KDE
        key: widgetStyle
        value: "Klassy"
      - group: Icons
        key: Theme
        value: klassy-dark

- name: KDE | Theme | Set window decorations to Klassy
  tags: KDE,theme,klassy
  community.general.kdeconfig:
    path: "{{ dotconfig_path }}/kwinrc"
    values:
      - group: org.kde.kdecoration2
        key: library
        value: org.kde.klassy
      - group: org.kde.kdecoration2
        key: theme
        value: Klassy

- name: KDE | Theme | Install YAMIS icon theme from vendored submodule
  tags: KDE,theme,icons
  copy:
    src: "{{ playbook_dir }}/vendor/kde/icons-yam/YAMIS/"
    dest: "{{ dotlocalshare_path }}/icons/YAMIS/"
    mode: preserve

- name: KDE | Theme | Install Lavender Plasma theme from vendored submodule
  tags: KDE,theme,plasma
  copy:
    src: "{{ playbook_dir }}/vendor/kde/plasma-lavender/Lavender-solid-color/"
    dest: "{{ dotlocalshare_path }}/plasma/desktoptheme/Lavender-solid-color/"
    mode: preserve

- name: KDE | Theme | Set Plasma desktop theme
  tags: KDE,theme,plasma
  community.general.kdeconfig:
    path: "{{ dotconfig_path }}/plasmarc"
    values:
      - group: Theme
        key: name
        value: "Lavender-solid-color"
