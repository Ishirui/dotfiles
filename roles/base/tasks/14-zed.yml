# Zed editor: install the app and deploy its config. Settings, the custom
# Catppuccin Macchiato theme and keybindings live in the repo under zed/;
# extensions are declared via auto_install_extensions in settings.json and
# installed by Zed on next launch.
#
# NOTE: configs deploy via `copy`, matching the other roles. Editor-made changes
# won't flow back to the repo. Language servers / LSP tooling are installed in
# 15-dev-tools.yml so they can be shared with OpenCode and the CLI.

# --- Install ----------------------------------------------------------------

- name: Zed | Install Zed
  tags: software,dev,editors,gui
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name:
      - zed

# --- Configuration ----------------------------------------------------------

- name: Zed | Deploy config (settings, keymap)
  tags: zed,editors
  copy:
    src: "{{ item }}"
    dest: "{{ dotconfig_path }}/zed/{{ item | basename }}"
  loop:
    - "{{ playbook_dir }}/zed/settings.json"
    - "{{ playbook_dir }}/zed/keymap.json"

- name: Zed | Deploy custom themes
  tags: zed,editors
  copy:
    src: "{{ playbook_dir }}/zed/themes/"
    dest: "{{ dotconfig_path }}/zed/themes/"
